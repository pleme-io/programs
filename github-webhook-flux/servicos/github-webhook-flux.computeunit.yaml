---
apiVersion: wasm.pleme.io/v1alpha1
kind: ComputeUnit
metadata:
  name: github-webhook-flux
  namespace: flux-system
spec:
  module:
    source: github:pleme-io/programs/github-webhook-flux/main.tlisp?ref=v0.1.0

  trigger:
    service:
      port: 8080
      paths: ["/git-webhook"]
      hosts: ["git-webhook.flux-system.svc.cluster.local"]
      breathability:
        enabled: true
        minReplicas: 0
        maxReplicas: 3
        cooldownPeriod: 600           # 10 min — webhooks burst then quiet

  capabilities:
    - http-in:0.0.0.0:8080
    - kube-resource-list@source.toolkit.fluxcd.io/gitrepositories
    - kube-resource-patch@source.toolkit.fluxcd.io/gitrepositories
    - kube-secret-read@flux-system/github-webhook-secret

  resources:
    requests: { cpu: 50m,  memory: 64Mi }
    limits:   { cpu: 500m, memory: 128Mi }
